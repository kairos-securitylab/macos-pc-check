name: macOS PC Check Test

# 수동 실행(Actions 탭 > Run workflow) 또는 스크립트 변경 push 시 실행
on:
  workflow_dispatch:
  push:
    paths:
      - "2026_macos_v*.sh"
      - ".github/workflows/macos-check-test.yml"

jobs:
  run-check:
    strategy:
      fail-fast: false          # 한 버전이 실패해도 나머지는 계속 실행
      matrix:
        os: [macos-14, macos-15, macos-26]   # Sonoma / Sequoia / Tahoe
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show environment
        run: |
          echo "===== macOS 버전 ====="
          sw_vers
          echo "bash: $(/bin/bash --version | head -n1)"

      # (1) 실제 스크립트 실행 — 저장소에서 가장 최신 버전(2026_macos_v*.sh)을 자동 선택해 실행
      - name: Run diagnostic script
        run: |
          SCRIPT="$(ls -1 2026_macos_v*.sh 2>/dev/null | sort -V | tail -1)"
          if [ -z "$SCRIPT" ]; then echo "진단 스크립트(2026_macos_v*.sh)를 찾지 못함"; exit 1; fi
          echo "실행 스크립트: $SCRIPT"
          chmod +x "$SCRIPT"
          sudo /bin/bash "./$SCRIPT" || true
          echo "----- 생성된 리포트 -----"
          ls -1 *_mac_*.txt 2>/dev/null || echo "리포트 파일 미생성"

      # (2) 파싱 검증용 원시 출력 덤프 — PC-01/02/15/16/18 판정의 근거 명령 실제 출력 확인
      - name: Dump raw command outputs (parsing check)
        run: |
          OUT="raw_${{ matrix.os }}.txt"
          {
            echo "########## PC-01/02 pwpolicy ##########"
            echo "--- getglobalpolicy ---"
            sudo pwpolicy -getglobalpolicy 2>&1 || true
            echo "--- getaccountpolicies ---"
            sudo pwpolicy -getaccountpolicies 2>&1 || true
            CU="$(stat -f '%Su' /dev/console 2>/dev/null)"
            echo "--- console user: $CU / getpolicy ---"
            [ -n "$CU" ] && sudo pwpolicy -u "$CU" -getpolicy 2>&1 || true

            echo "########## PC-15 firewall ##########"
            /usr/libexec/ApplicationFirewall/socketfilterfw --getglobalstate 2>&1 || true
            /usr/libexec/ApplicationFirewall/socketfilterfw --getstealthmode 2>&1 || true

            echo "########## PC-16 screensaver ##########"
            [ -n "$CU" ] && sudo -u "$CU" defaults read com.apple.screensaver askForPassword 2>&1 || true
            [ -n "$CU" ] && sudo -u "$CU" defaults -currentHost read com.apple.screensaver idleTime 2>&1 || true

            echo "########## PC-18 remote ##########"
            sudo systemsetup -getremotelogin 2>&1 || true
            sudo systemsetup -getremoteappleevents 2>&1 || true

            echo "########## PC-11 version ##########"
            sw_vers -productVersion 2>&1 || true

            echo "########## PC-04 sharing ##########"
            sharing -l 2>&1 || true
            dscl . -list /SharePoints 2>&1 || true
          } | tee "$OUT"

      # (3) 리포트와 원시출력을 아티팩트로 저장 → 다운로드해서 확인
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-check-${{ matrix.os }}
          path: |
            *_mac_*.txt
            raw_${{ matrix.os }}.txt
          if-no-files-found: warn
